<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Combustible Mapa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-map-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root {
      --bg: #F2F2F7;
      --card-bg: #FFFFFF;
      --text-primary: #1C1C1E;
      --text-secondary: #8E8E93;
      --text-tertiary: #AEAEB2;
      --system-blue: #007AFF;
      --system-green: #34C759;
      --system-orange: #FF9500;
      --system-red: #FF3B30;
      --bar-bg: #E5E5EA;
      --overlay-bg: rgba(255,255,255,0.85);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --card-bg: #1C1C1E;
        --text-primary: #FFF;
        --text-secondary: #8E8E93;
        --text-tertiary: #636366;
        --system-blue: #0A84FF;
        --system-green: #30D158;
        --system-orange: #FF9F0A;
        --system-red: #FF453A;
        --bar-bg: #38383A;
        --overlay-bg: rgba(28,28,30,0.85);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #map {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* Header overlay */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: var(--overlay-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-left { display: flex; flex-direction: column; }

    .header-title {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      background: color-mix(in srgb, var(--system-blue) 12%, transparent);
      border-radius: 12px;
      padding: 4px 10px;
      font-weight: 700;
      font-size: 13px;
      color: var(--system-blue);
    }

    .refresh-btn {
      appearance: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--system-blue) 10%, transparent);
      color: var(--system-blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .refresh-btn svg { width: 16px; height: 16px; }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Locate button */
    .locate-btn {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 16px;
      z-index: 10;
      appearance: none;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--system-blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .locate-btn svg { width: 20px; height: 20px; }

    /* InfoWindow custom content */
    .iw-content { padding: 2px 0; font-family: -apple-system, system-ui, sans-serif; }

    .iw-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .iw-name {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.2px;
      color: #1C1C1E;
    }

    .iw-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .iw-dot.green { background: #34C759; }
    .iw-dot.orange { background: #FF9500; }
    .iw-dot.red { background: #FF3B30; }
    .iw-dot.gray { background: #AEAEB2; }

    .iw-company {
      font-size: 12px;
      color: #8E8E93;
      margin-bottom: 8px;
    }

    .iw-litros-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 8px;
    }

    .iw-litros {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
      color: #1C1C1E;
    }

    .iw-litros.empty {
      color: #AEAEB2;
      font-size: 18px;
    }

    .iw-unit {
      font-size: 13px;
      color: #8E8E93;
      font-weight: 500;
    }

    .iw-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .iw-bar-track {
      flex: 1;
      height: 4px;
      border-radius: 3px;
      background: rgba(174,174,178,0.2);
      overflow: hidden;
    }

    .iw-bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    .iw-bar-fill.green { background: linear-gradient(90deg, #86EFAC, #22C55E); }
    .iw-bar-fill.orange { background: linear-gradient(90deg, #FDE68A, #F59E0B); }
    .iw-bar-fill.red { background: linear-gradient(90deg, #FECACA, #EF4444); }

    .iw-bar-pct {
      font-size: 11px;
      font-weight: 600;
      color: #8E8E93;
      min-width: 28px;
      text-align: right;
    }

    .iw-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .iw-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #007AFF;
      font-size: 13px;
      font-weight: 600;
      background: rgba(0,122,255,0.08);
      padding: 6px 12px;
      border-radius: 10px;
      text-decoration: none;
    }

    .iw-cta svg { width: 13px; height: 13px; }

    .iw-dist {
      font-size: 13px;
      font-weight: 600;
      color: #8E8E93;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--overlay-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text-secondary);
      font-size: 14px;
      font-family: -apple-system, system-ui, sans-serif;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--bar-bg);
      border-top-color: var(--system-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    .loading-overlay.hidden { display: none; }

    /* Clean up Google Maps UI */
    .gm-style-cc { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-title">Combustible</span>
      <span class="header-subtitle">Gasolina Especial</span>
    </div>
    <div class="header-right">
      <span class="pill" id="pill" style="display:none"></span>
      <button class="refresh-btn" id="refreshBtn" title="Actualizar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </div>
  </div>

  <div id="map"></div>

  <button class="locate-btn" id="locateBtn" title="Mi ubicación">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
    </svg>
  </button>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    Cargando estaciones...
  </div>

  <script>
    // Google Maps callback
    function initMap() {
      window._mapReady = true;
      if (window._pendingLoad) window._pendingLoad();
    }
  </script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCeQumrwhLuL4n8PTcFrMuq5tt4ipwUu_s&callback=initMap"></script>

  <script type="module">
    import { STATIONS } from '../shared/stations.js';
    import { fetchAllStations, getDistances } from '../shared/fetchers.js';

    const pillEl = document.getElementById('pill');
    const refreshBtn = document.getElementById('refreshBtn');
    const locateBtn = document.getElementById('locateBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const DEFAULT_LAT = -17.7833;
    const DEFAULT_LON = -63.1821;

    const COLOR_HEX = {
      green: '#34C759',
      orange: '#FF9500',
      red: '#FF3B30',
      gray: '#AEAEB2',
    };

    let map;
    let userMarker = null;
    let stationMarkers = [];
    let openInfoWindow = null;

    /* ── Helpers ─────────────────────────── */

    function formatNumber(n) {
      return n.toLocaleString('es-BO');
    }

    function formatLitrosShort(litros) {
      if (litros === 0) return '0';
      if (litros >= 1000) return Math.round(litros / 1000) + 'K';
      return String(litros);
    }

    function getColorClass(litros, capacidad) {
      if (litros === 0) return 'gray';
      const pct = capacidad > 0 ? litros / capacidad : 0;
      if (pct >= 0.5) return 'green';
      if (pct >= 0.2) return 'orange';
      return 'red';
    }

    function formatDistance(km) {
      if (km == null) return '';
      if (km < 1) return `${Math.round(km * 1000)} m`;
      return `${km.toFixed(1)} km`;
    }

    function getUserLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve(null);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          () => resolve(null),
          { timeout: 10000, maximumAge: 60000 }
        );
      });
    }

    /* ── Marker SVG ──────────────────────── */

    function createMarkerSvg(label, bgColor) {
      const textLen = label.length;
      const width = Math.max(32, textLen * 8 + 16);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="38" viewBox="0 ${0} ${width} 38">
          <rect x="0" y="0" width="${width}" height="28" rx="14" fill="${bgColor}"/>
          <polygon points="${width/2 - 5},28 ${width/2 + 5},28 ${width/2},36" fill="${bgColor}"/>
          <text x="${width/2}" y="18" text-anchor="middle" fill="white" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="700">${label}</text>
        </svg>`;
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }

    /* ── InfoWindow HTML ─────────────────── */

    function buildInfoWindowHtml(station, colorClass, litros, pct, distKm, waze) {
      const available = litros > 0;
      const pctRound = Math.round(pct * 100);

      const barFill = available
        ? `<div class="iw-bar-fill ${colorClass}" style="width:${Math.max(pct * 100, 5)}%"></div>`
        : '';

      const distHtml = distKm != null
        ? `<span class="iw-dist">${formatDistance(distKm)}</span>`
        : '';

      const ctaHtml = waze
        ? `<a class="iw-cta" href="${waze}" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
            Navegar
          </a>`
        : '';

      return `<div class="iw-content">
        <div class="iw-name-row">
          <span class="iw-name">${station.name}</span>
          <div class="iw-dot ${colorClass}"></div>
        </div>
        <div class="iw-company">${station.company}</div>
        <div class="iw-litros-row">
          <span class="iw-litros${available ? '' : ' empty'}">${available ? formatNumber(litros) : '\u2014'}</span>
          ${available ? '<span class="iw-unit">litros</span>' : ''}
        </div>
        <div class="iw-bar">
          <div class="iw-bar-track">${barFill}</div>
          <span class="iw-bar-pct">${pctRound}%</span>
        </div>
        <div class="iw-bottom">
          ${ctaHtml}
          ${distHtml}
        </div>
      </div>`;
    }

    /* ── Map setup ───────────────────────── */

    function setupMap() {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: DEFAULT_LAT, lng: DEFAULT_LON },
        zoom: 13,
        disableDefaultUI: true,
        zoomControl: false,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        gestureHandling: 'greedy',
        mapId: isDark ? 'DEMO_MAP_ID' : undefined,
        styles: isDark ? [
          { elementType: 'geometry', stylers: [{ color: '#242f3e' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#242f3e' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#746855' }] },
          { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#38414e' }] },
          { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#212a37' }] },
          { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#9ca5b3' }] },
          { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#17263c' }] },
          { featureType: 'poi', stylers: [{ visibility: 'off' }] },
          { featureType: 'transit', stylers: [{ visibility: 'off' }] },
          { featureType: 'landscape.man_made', stylers: [{ visibility: 'off' }] },
        ] : [
          { featureType: 'poi', stylers: [{ visibility: 'off' }] },
          { featureType: 'transit', stylers: [{ visibility: 'off' }] },
          { featureType: 'landscape.man_made', stylers: [{ visibility: 'off' }] },
        ],
      });
    }

    /* ── Data loading ────────────────────── */

    async function loadData() {
      refreshBtn.classList.add('spinning');
      loadingOverlay.classList.remove('hidden');

      try {
        const [location, stationResults] = await Promise.all([
          getUserLocation(),
          fetchAllStations(STATIONS),
        ]);

        const wazeMap = {};
        const coordMap = {};
        for (const s of STATIONS) {
          wazeMap[s.name] = s.waze;
          coordMap[s.name] = { lat: s.lat, lon: s.lon };
        }

        let results = stationResults.map((r) => ({
          ...r,
          waze: wazeMap[r.name] || null,
          lat: coordMap[r.name]?.lat,
          lon: coordMap[r.name]?.lon,
          distKm: null,
        }));

        const refLat = location ? location.lat : DEFAULT_LAT;
        const refLon = location ? location.lon : DEFAULT_LON;
        const withDist = await getDistances(refLat, refLon, results);
        results = withDist.map((r) => ({
          ...r,
          waze: wazeMap[r.name] || null,
          lat: coordMap[r.name]?.lat,
          lon: coordMap[r.name]?.lon,
        }));

        const maxLitros = Math.max(...results.map((r) => r.litros), 1);

        // Clear old markers
        for (const m of stationMarkers) m.setMap(null);
        stationMarkers = [];
        if (openInfoWindow) openInfoWindow.close();

        // Bounds
        const bounds = new google.maps.LatLngBounds();

        // Add station markers
        for (const r of results) {
          if (r.lat == null || r.lon == null) continue;

          const cap = r.capacidad > 0 ? r.capacidad : maxLitros;
          const colorClass = getColorClass(r.litros, cap);
          const litrosShort = formatLitrosShort(r.litros);
          const pct = r.litros > 0 ? r.litros / cap : 0;
          const bgColor = COLOR_HEX[colorClass];

          const marker = new google.maps.Marker({
            position: { lat: r.lat, lng: r.lon },
            map,
            icon: {
              url: createMarkerSvg(litrosShort, bgColor),
              scaledSize: new google.maps.Size(
                Math.max(32, litrosShort.length * 8 + 16), 38
              ),
              anchor: new google.maps.Point(
                Math.max(32, litrosShort.length * 8 + 16) / 2, 36
              ),
            },
            title: r.name,
            optimized: false,
          });

          const infoHtml = buildInfoWindowHtml(r, colorClass, r.litros, pct, r.distKm, r.waze);
          const infoWindow = new google.maps.InfoWindow({
            content: infoHtml,
            maxWidth: 280,
          });

          marker.addListener('click', () => {
            if (openInfoWindow) openInfoWindow.close();
            infoWindow.open(map, marker);
            openInfoWindow = infoWindow;
          });

          stationMarkers.push(marker);
          bounds.extend({ lat: r.lat, lng: r.lon });
        }

        // User location
        if (location) {
          if (userMarker) {
            userMarker.setPosition({ lat: location.lat, lng: location.lon });
          } else {
            userMarker = new google.maps.Marker({
              position: { lat: location.lat, lng: location.lon },
              map,
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 8,
                fillColor: '#007AFF',
                fillOpacity: 1,
                strokeColor: '#FFFFFF',
                strokeWeight: 3,
              },
              zIndex: 1000,
              title: 'Tu ubicación',
            });
          }
          bounds.extend({ lat: location.lat, lng: location.lon });
        }

        // Center on user location, fallback to fitBounds
        if (location) {
          map.setCenter({ lat: location.lat, lng: location.lon });
          map.setZoom(14);
        } else if (!bounds.isEmpty()) {
          map.fitBounds(bounds, { top: 80, bottom: 40, left: 20, right: 20 });
        }

        // Update pill
        const countAvail = results.filter((r) => r.litros > 0).length;
        pillEl.textContent = `${countAvail}/${results.length}`;
        pillEl.style.display = '';
      } catch (err) {
        console.error('Error cargando datos:', err);
      } finally {
        refreshBtn.classList.remove('spinning');
        loadingOverlay.classList.add('hidden');
      }
    }

    /* ── Events ──────────────────────────── */

    refreshBtn.addEventListener('click', loadData);

    locateBtn.addEventListener('click', async () => {
      const loc = await getUserLocation();
      if (loc) {
        if (userMarker) {
          userMarker.setPosition({ lat: loc.lat, lng: loc.lon });
        }
        map.panTo({ lat: loc.lat, lng: loc.lon });
        map.setZoom(14);
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') loadData();
    });

    window.addEventListener('pageshow', (e) => {
      if (e.persisted) loadData();
    });

    /* ── Init ────────────────────────────── */

    function start() {
      setupMap();
      loadData();
    }

    if (window._mapReady) {
      start();
    } else {
      window._pendingLoad = start;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.log('SW registro fallido:', err);
      });
    }
  </script>
</body>
</html>
