<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Blue rounded-rect background -->
  <rect width="512" height="512" rx="100" ry="100" fill="#007AFF"/>

  <!-- Location pin (outer shape) -->
  <path d="M256 420 C256 420, 148 300, 148 220 C148 160, 196 108, 256 108 C316 108, 364 160, 364 220 C364 300, 256 420, 256 420Z" fill="white"/>

  <!-- Inner circle of pin -->
  <circle cx="256" cy="216" r="72" fill="#007AFF"/>

  <!-- Fuel pump body (inside pin) -->
  <rect x="224" y="180" width="48" height="62" rx="5" ry="5" fill="white"/>

  <!-- Fuel gauge window -->
  <rect x="230" y="188" width="36" height="20" rx="3" ry="3" fill="#007AFF"/>

  <!-- Gauge needle -->
  <line x1="240" y1="204" x2="256" y2="192" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Pump base -->
  <rect x="220" y="238" width="56" height="8" rx="3" ry="3" fill="white"/>

  <!-- Nozzle arm -->
  <rect x="272" y="186" width="16" height="6" rx="2" ry="2" fill="white"/>

  <!-- Nozzle vertical -->
