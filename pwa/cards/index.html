<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Combustible Cards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="../shared/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../shared/icons/icon-192.svg">
  <style>
    :root {
      --bg: #F2F2F7;
      --card-bg: #FFFFFF;
      --text-primary: #1C1C1E;
      --text-secondary: #8E8E93;
      --text-tertiary: #AEAEB2;
      --system-blue: #007AFF;
      --system-green: #34C759;
      --system-orange: #FF9500;
      --system-red: #FF3B30;
      --bar-bg: #E5E5EA;
      --line-color: #D1D1D6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --card-bg: #1C1C1E;
        --text-primary: #FFF;
        --text-secondary: #8E8E93;
        --text-tertiary: #636366;
        --system-blue: #0A84FF;
        --system-green: #30D158;
        --system-orange: #FF9F0A;
        --system-red: #FF453A;
        --bar-bg: #38383A;
        --line-color: #38383A;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-left { display: flex; flex-direction: column; }

    .header-title {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      background: color-mix(in srgb, var(--system-blue) 12%, transparent);
      border-radius: 12px;
      padding: 4px 10px;
      font-weight: 700;
      font-size: 13px;
      color: var(--system-blue);
    }

    .refresh-btn {
      appearance: none;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--system-blue) 10%, transparent);
      color: var(--system-blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .refresh-btn svg { width: 16px; height: 16px; }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Journey timeline */
    .journey { position: relative; }

    .journey::before {
      content: '';
      position: absolute;
      left: 9px;
      top: 0;
      bottom: 20px;
      width: 2.5px;
      background: linear-gradient(to bottom, var(--system-blue), color-mix(in srgb, var(--system-blue) 40%, transparent));
      border-radius: 2px;
    }

    /* Origin node */
    .origin {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 20px;
      position: relative;
    }

    .origin-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--system-blue);
      box-shadow: 0 0 0 5px color-mix(in srgb, var(--system-blue) 15%, transparent);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .origin-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--system-blue);
    }

    /* Distance separator */
    .distance-sep {
      display: flex;
      align-items: center;
      padding: 6px 0 6px 0;
      position: relative;
      z-index: 2;
    }

    .distance-badge {
      background: var(--bg);
      border: 1.5px solid var(--line-color);
      border-radius: 10px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Station node */
    .station-node {
      display: flex;
      gap: 12px;
      padding: 0 0 16px;
      position: relative;
    }

    .node-icon-col {
      flex-shrink: 0;
      width: 20px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .node-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      margin-top: 32px;
    }

    .node-dot.green {
      background: var(--system-green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--system-green) 20%, transparent);
    }
    .node-dot.orange {
      background: var(--system-orange);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--system-orange) 20%, transparent);
    }
    .node-dot.red {
      background: var(--system-red);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--system-red) 20%, transparent);
    }
    .node-dot.gray {
      background: var(--text-tertiary);
    }

    /* Station card */
    .station-card {
      flex: 1;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 14px 16px;
      cursor: pointer;
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.04), 0 2px 6px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .station-card:active {
      transform: scale(0.98);
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.04);
    }

    .station-card.dimmed { opacity: 0.55; }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    /* 3D Pump Icon (thiings.co) */
    .pump-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .pump-icon.green {
      filter: hue-rotate(90deg) saturate(1.4) brightness(1.05);
    }
    .pump-icon.orange {
      filter: hue-rotate(30deg) saturate(1.6) brightness(1.05);
    }
    .pump-icon.red {
      filter: hue-rotate(-10deg) saturate(1.8) brightness(0.95);
    }
    .pump-icon.gray {
      filter: grayscale(1) opacity(0.5);
    }

    /* Card info */
    .card-info { flex: 1; min-width: 0; }

    .card-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .card-name {
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.2px;
      color: var(--text-primary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green { background: var(--system-green); }
    .status-dot.orange { background: var(--system-orange); }
    .status-dot.red { background: var(--system-red); }
    .status-dot.gray { background: var(--text-tertiary); }

    .card-company {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .litros-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 8px;
    }

    .litros-number {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.8px;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }

    .litros-number.empty {
      color: var(--text-tertiary);
      font-size: 20px;
    }

    .litros-unit {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stock-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .bar-track {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--text-tertiary) 20%, transparent);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .bar-fill.green { background: linear-gradient(90deg, #86EFAC, #22C55E); }
    .bar-fill.orange { background: linear-gradient(90deg, #FDE68A, #F59E0B); }
    .bar-fill.red { background: linear-gradient(90deg, #FECACA, #EF4444); }

    .bar-pct {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 28px;
      text-align: right;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--system-blue);
      font-size: 13px;
      font-weight: 600;
      background: color-mix(in srgb, var(--system-blue) 8%, transparent);
      padding: 6px 12px;
      border-radius: 10px;
    }

    .card-cta svg { width: 13px; height: 13px; }

    .card-dist {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Footer */
    .update-footer {
      text-align: center;
      padding: 8px 0;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--bar-bg);
      border-top-color: var(--system-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="header-title">Combustible</span>
        <span class="header-subtitle">Gasolina Especial</span>
      </div>
      <div class="header-right">
        <span class="pill" id="pill" style="display:none"></span>
        <button class="refresh-btn" id="refreshBtn" title="Actualizar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        Cargando estaciones...
      </div>
    </div>

    <div class="update-footer" id="footer" style="display:none">
      <span id="footerText"></span>
    </div>
  </div>

  <script type="module">
    import { STATIONS } from '../shared/stations.js';
    import { fetchAllStations, getDistances, haversineKm } from '../shared/fetchers.js';

    const contentEl = document.getElementById('content');
    const pillEl = document.getElementById('pill');
    const footerEl = document.getElementById('footer');
    const footerTextEl = document.getElementById('footerText');
    const refreshBtn = document.getElementById('refreshBtn');

    const MAX_ITEMS = 30;

    // Centro de Santa Cruz de la Sierra (fallback cuando no hay geolocalización)
    const DEFAULT_LAT = -17.7833;
    const DEFAULT_LON = -63.1821;

    function formatNumber(n) {
      return n.toLocaleString('es-BO');
    }

    function getColorClass(litros, maxLitros) {
      if (litros === 0) return 'gray';
      const pct = litros / maxLitros;
      if (pct >= 0.5) return 'green';
      if (pct >= 0.2) return 'orange';
      return 'red';
    }

    function formatDistance(km) {
      if (km < 1) return `${Math.round(km * 1000)} m`;
      return `${km.toFixed(1)} km`;
    }

    function getUserLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve(null);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          () => resolve(null),
          { timeout: 10000, maximumAge: 60000 }
        );
      });
    }

    const PUMP_ICON_URL = 'https://lftz25oez4aqbxpq.public.blob.vercel-storage.com/image-Y9XTBPYYZden371yTkDUk5RakCVmX9.png';

    function createPumpIcon(colorClass) {
      const img = document.createElement('img');
      img.className = `pump-icon ${colorClass}`;
      img.src = PUMP_ICON_URL;
      img.alt = 'Surtidor';
      img.loading = 'lazy';
      return img;
    }

    function renderJourney(stations, maxLitros) {
      const journey = document.createElement('div');
      journey.className = 'journey';

      // Origin node
      const origin = document.createElement('div');
      origin.className = 'origin';
      origin.innerHTML =
        '<div class="origin-dot"></div>' +
        '<span class="origin-label">Tu ubicación</span>';
      journey.appendChild(origin);

      let prevDistKm = 0; // track previous station distance for incremental badge

      for (const r of stations) {
        const available = r.litros > 0;
        const pct = available ? r.litros / maxLitros : 0;
        const pctRound = Math.round(pct * 100);
        const colorClass = getColorClass(r.litros, maxLitros);

        // Distance separator (incremental: distance between stations)
        if (r.distKm != null) {
          const delta = r.distKm - prevDistKm;
          const sep = document.createElement('div');
          sep.className = 'distance-sep';
          const badge = document.createElement('span');
          badge.className = 'distance-badge';
          badge.textContent = `+ ${formatDistance(delta)}`;
          sep.appendChild(badge);
          journey.appendChild(sep);
          prevDistKm = r.distKm;
        }

        // Station node
        const node = document.createElement('div');
        node.className = 'station-node';

        // Left: dot on the line
        const iconCol = document.createElement('div');
        iconCol.className = 'node-icon-col';
        const dot = document.createElement('div');
        dot.className = `node-dot ${colorClass}`;
        iconCol.appendChild(dot);
        node.appendChild(iconCol);

        // Right: card
        const card = document.createElement('div');
        card.className = `station-card${available ? '' : ' dimmed'}`;
        if (r.waze) {
          card.addEventListener('click', () => window.open(r.waze, '_blank'));
        }

        const header = document.createElement('div');
        header.className = 'card-header';

        // 3D pump icon
        header.appendChild(createPumpIcon(colorClass));

        // Info
        const info = document.createElement('div');
        info.className = 'card-info';

        // Name row
        const nameRow = document.createElement('div');
        nameRow.className = 'card-name-row';
        const name = document.createElement('span');
        name.className = 'card-name';
        name.textContent = r.name;
        const statusDot = document.createElement('div');
        statusDot.className = `status-dot ${colorClass}`;
        nameRow.appendChild(name);
        nameRow.appendChild(statusDot);
        info.appendChild(nameRow);

        // Company
        const company = document.createElement('span');
        company.className = 'card-company';
        company.textContent = r.company;
        info.appendChild(company);

        // Litros
        const litrosRow = document.createElement('div');
        litrosRow.className = 'litros-row';
        const numEl = document.createElement('span');
        numEl.className = `litros-number${available ? '' : ' empty'}`;
        numEl.textContent = available ? formatNumber(r.litros) : '\u2014';
        litrosRow.appendChild(numEl);
        if (available) {
          const unitEl = document.createElement('span');
          unitEl.className = 'litros-unit';
          unitEl.textContent = 'litros';
          litrosRow.appendChild(unitEl);
        }
        info.appendChild(litrosRow);

        // Stock bar
        const stockBar = document.createElement('div');
        stockBar.className = 'stock-bar';
        const barTrack = document.createElement('div');
        barTrack.className = 'bar-track';
        if (pct > 0) {
          const barFill = document.createElement('div');
          barFill.className = `bar-fill ${colorClass}`;
          barFill.style.width = `${Math.max(pct * 100, 5)}%`;
          barTrack.appendChild(barFill);
        }
        stockBar.appendChild(barTrack);
        const pctText = document.createElement('span');
        pctText.className = 'bar-pct';
        pctText.textContent = `${pctRound}%`;
        stockBar.appendChild(pctText);
        info.appendChild(stockBar);

        // Bottom row: CTA + distance
        const bottom = document.createElement('div');
        bottom.className = 'card-bottom';

        const cta = document.createElement('div');
        cta.className = 'card-cta';
        cta.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>' +
          'Navegar';
        bottom.appendChild(cta);

        if (r.distKm != null) {
          const dist = document.createElement('span');
          dist.className = 'card-dist';
          dist.textContent = formatDistance(r.distKm);
          bottom.appendChild(dist);
        }

        info.appendChild(bottom);

        header.appendChild(info);
        card.appendChild(header);
        node.appendChild(card);
        journey.appendChild(node);
      }

      return journey;
    }

    async function loadData() {
      refreshBtn.classList.add('spinning');

      try {
        // Fetch location and station data in parallel
        const [location, stationResults] = await Promise.all([
          getUserLocation(),
          fetchAllStations(STATIONS),
        ]);

        // Add waze links back from STATIONS config
        const stationMap = {};
        for (const s of STATIONS) {
          stationMap[s.name] = s.waze;
        }

        let results = stationResults.map((r) => ({
          ...r,
          waze: stationMap[r.name] || null,
          distKm: null,
        }));

        // Get distances — use real location or fallback to city center
        const refLat = location ? location.lat : DEFAULT_LAT;
        const refLon = location ? location.lon : DEFAULT_LON;
        const withDist = await getDistances(refLat, refLon, results);
        results = withDist.map((r) => ({
          ...r,
          waze: stationMap[r.name] || null,
        }));

        // Sort by distance
        results.sort((a, b) => a.distKm - b.distKm);

        const top = results.slice(0, MAX_ITEMS);
        const maxLitros = Math.max(...top.map((r) => r.litros), 1);

        // Update pill
        const countAvail = top.filter((r) => r.litros > 0).length;
        pillEl.textContent = `${countAvail}/${top.length}`;
        pillEl.style.display = '';

        // Render journey
        const journey = renderJourney(top, maxLitros);
        contentEl.innerHTML = '';
        contentEl.appendChild(journey);

        // Update footer
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        footerTextEl.textContent = `Actualizado ${hh}:${mm}`;
        footerEl.style.display = '';
      } catch (err) {
        console.error('Error cargando datos:', err);
        contentEl.innerHTML = `<div class="loading" style="color:var(--text-secondary)">Error al cargar datos. Toca actualizar.</div>`;
      } finally {
        refreshBtn.classList.remove('spinning');
      }
    }

    refreshBtn.addEventListener('click', loadData);

    // Reload data when returning to the app (e.g. after opening Waze)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        loadData();
      }
    });
    // iOS PWA: pageshow fires when app is restored from background
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        loadData();
      }
    });
    // Fallback: focus event
    window.addEventListener('focus', () => {
      loadData();
    });

    // Initial load
    loadData();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.log('SW registro fallido:', err);
      });
    }
  </script>
</body>
</html>
